<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Empêche Chrome d'appliquer Auto Dark Theme -->
<meta name="color-scheme" content="only light">
<meta name="supported-color-schemes" content="only light">

<!-- Pour theme-color responsive -->
<meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#08080D" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light">

    <style>
      :root {
        /* "only light" indique au navigateur de ne pas appliquer d'inversion */
        color-scheme: only light;
      }

      /* On s'assure que le body ne subit pas de modification sauvage au départ */
      body {
        background-color: #FAF7F2 !important;
        color: #2C1810 !important;
      }
    </style>

    <title>Mariage Amine & Lina</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  </body>
</html>
